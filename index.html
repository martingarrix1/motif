<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbzv3xVInSeTmisnUk7X9u2eRNeRbOgrCs--Wuaqh0BtCx4n4BV00Ik4RsoqoMKi071zDw/exec';

// ═══════════════════════════════════════════════════════════════
// 전역 상태 관리 (단일 객체로 통합)
// ═══════════════════════════════════════════════════════════════
const State = {
  customers: [],
  aftercare: [],
  reservations: [],
  calendarData: [],
  customerTotal: 0,
  aftercareTotal: 0,
  customerOffset: 0,
  aftercareOffset: 0,
  calendarYear: new Date().getFullYear(),
  calendarMonth: new Date().getMonth(),
  currentPage: 'consult',
  isLoading: false,
  memoFilter: '전체'
};

// ═══════════════════════════════════════════════════════════════
// 캐시 시스템 (30분 TTL, LRU 방식)
// ═══════════════════════════════════════════════════════════════
const Cache = {
  TTL: 30 * 60 * 1000,
  MAX_ITEMS: 20,
  
  set(key, data) {
    try {
      const items = this._getAll();
      items[key] = { t: Date.now(), d: data };
      // LRU: 오래된 항목 제거
      const keys = Object.keys(items);
      if (keys.length > this.MAX_ITEMS) {
        const oldest = keys.sort((a, b) => items[a].t - items[b].t)[0];
        delete items[oldest];
      }
      sessionStorage.setItem('motif_cache', JSON.stringify(items));
    } catch(e) { sessionStorage.clear(); }
  },
  
  get(key) {
    try {
      const items = this._getAll();
      const item = items[key];
      if (!item) return null;
      if (Date.now() - item.t > this.TTL) {
        delete items[key];
        sessionStorage.setItem('motif_cache', JSON.stringify(items));
        return null;
      }
      return item.d;
    } catch(e) { return null; }
  },
  
  clear(key) {
    try {
      if (key) {
        const items = this._getAll();
        delete items[key];
        sessionStorage.setItem('motif_cache', JSON.stringify(items));
      } else {
        sessionStorage.removeItem('motif_cache');
      }
    } catch(e) {}
  },
  
  _getAll() {
    try { return JSON.parse(sessionStorage.getItem('motif_cache') || '{}'); }
    catch(e) { return {}; }
  }
};

// ═══════════════════════════════════════════════════════════════
// API 통신 (재시도 + 타임아웃)
// ═══════════════════════════════════════════════════════════════
async function api(params, retries = 2) {
  const url = API_URL + '?' + new URLSearchParams(params);
  for (let i = 0; i <= retries; i++) {
    try {
      const controller = new AbortController();
      const timeout = setTimeout(() => controller.abort(), 15000);
      const res = await fetch(url, { signal: controller.signal });
      clearTimeout(timeout);
      return res.json();
    } catch(e) {
      if (i === retries) throw e;
      await new Promise(r => setTimeout(r, 500 * (i + 1)));
    }
  }
}

async function apiPost(body, retries = 1) {
  for (let i = 0; i <= retries; i++) {
    try {
      const controller = new AbortController();
      const timeout = setTimeout(() => controller.abort(), 20000);
      const res = await fetch(API_URL, {
        method: 'POST',
        body: JSON.stringify(body),
        signal: controller.signal
      });
      clearTimeout(timeout);
      return res.json();
    } catch(e) {
      if (i === retries) throw e;
      await new Promise(r => setTimeout(r, 500));
    }
  }
}

// ═══════════════════════════════════════════════════════════════
// 유틸리티
// ═══════════════════════════════════════════════════════════════
function $(sel) { return document.querySelector(sel); }
function $$(sel) { return document.querySelectorAll(sel); }

function showToast(msg) {
  const t = $('#toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._tid);
  t._tid = setTimeout(() => t.classList.remove('show'), 3000);
}

function debounce(fn, ms) {
  let tid;
  return (...args) => { clearTimeout(tid); tid = setTimeout(() => fn(...args), ms); };
}

function escapeHtml(str) {
  return String(str||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// ═══════════════════════════════════════════════════════════════
// 페이지 라우팅 (이벤트 위임)
// ═══════════════════════════════════════════════════════════════
function showPage(page) {
  $$('.page').forEach(p => p.classList.remove('active'));
  $$('.nav button').forEach(b => b.classList.remove('active'));
  $(`#page-${page}`).classList.add('active');
  const navBtn = $(`.nav button[data-page="${page}"]`);
  if (navBtn) navBtn.classList.add('active');
  $('#more-menu').style.display = 'none';
  State.currentPage = page;
  
  // 페이지별 초기화 (lazy load)
  switch(page) {
    case 'consult': initConsultPage(); break;
    case 'customers': if (!State.customers.length) loadCustomers(); break;
    case 'aftercare': if (!State.aftercare.length) loadAftercare(); break;
    case 'todo': initTodoPage(); break;
    case 'calendar': initCalendarPage(); break;
    case 'glass': initGlassPage(); break;
    case 'memo': initMemoPage(); break;
    case 'invoice': initInvoicePage(); break;
    case 'tint': initTintPage(); break;
  }
}

// ═══════════════════════════════════════════════════════════════
// 상담 페이지
// ═══════════════════════════════════════════════════════════════

  if (page.innerHTML) return; // 이미 초기화됨
  
  const tintOpts = ['LX70','LX55','LX40','LX25','LX15','보그40','보그30','보그20','보그10','제니스50','제니스30','제니스15','제니스05','퀀텀37','퀀텀28','퀀텀19','퀀텀14','퀀텀08','티타늄26','티타늄16','티타늄06','G라인30','G라인10','S라인30','S라인10','XRPLUS55','XRPLUS30','XRPLUS20','XRPLUS15','XRPLUS05'].map(o=>`<option>${o}</option>`).join('');
  
  page.innerHTML = `
    <div class="card">

      <div class="form-group"><label>차종</label><input type="text" id="carType" placeholder="예) 카니발"></div>
      <div class="form-group"><label>고객명</label><input type="text" id="name" placeholder="이름"></div>
      <div class="form-group"><label>연락처</label><input type="tel" id="phone" placeholder="010-0000-0000"></div>
    </div>
    <div class="card">
      <div class="card-title">시공분류</div>
      <div class="check-group" id="category-group">
        ${['썬팅','PPF','가죽','유리막','전장','복합'].map(v=>`<label class="check-item"><input type="checkbox" value="${v}"> ${v}</label>`).join('')}
      </div>
    </div>
    <div class="card">
      <div class="card-title">틴팅</div>
      ${['전면:tintF','측면1열:tintS1','측면2열:tintS2','후면:tintR','썬루프:tintSun'].map(x=>{const[l,id]=x.split(':');return`<div class="form-group"><label>${l}</label><select id="${id}"><option value="">-</option>${tintOpts}</select></div>`}).join('')}
    </div>
    <div class="card">
      <div class="card-title">PPF</div>
      <div class="check-group" id="ppf-group">
        ${['본넷','문콕','프런트A','프런트F','생활보호','전체'].map(v=>`<label class="check-item"><input type="checkbox" value="${v}"> ${v==='본넷'?'본넷PPF':v==='문콕'?'문콕패키지':v==='전체'?'전체PPF':v}</label>`).join('')}
      </div>
    </div>
    <div class="card">
      <div class="card-title">코팅작업</div>
      <div class="check-group" id="coating-group">
        ${['유리막','그래핀','가죽기본','UG가죽','야와라A','야와라B'].map(v=>`<label class="check-item"><input type="checkbox" value="${v}"> ${v==='유리막'?'유리막코팅':v==='그래핀'?'그래핀코팅':v}</label>`).join('')}
      </div>
    </div>

async function submitConsult() {
  const name = $('#name').value.trim();
  const carType = $('#carType').value.trim();
  const phone = $('#phone').value.trim();
  if (!name || !carType || !phone) { showToast('차종, 고객명, 연락처를 입력해주세요!'); return; }
  
  const getChecked = (sel) => [...$$(sel + ' input:checked')].map(c => c.value);
  const category = getChecked('#category-group').join(' / ');
  const ppfText = getChecked('#ppf-group').join(', ');
  const coatingText = getChecked('#coating-group').join(', ');
  const tintF = $('#tintF').value, tintS1 = $('#tintS1').value, tintS2 = $('#tintS2').value;
  const tintR = $('#tintR').value, tintSun = $('#tintSun').value;
  const blackbox = $('#blackbox').value, battery = $('#battery').value;
  const etcValue = $('#etcValue').value;
  const combinedM = [coatingText, etcValue].filter(Boolean).join(' / ');
  
  let summaryParts = [];
  if (category) summaryParts.push('시공: ' + category);
  let tintParts = [];
  if (tintF) tintParts.push('전면: ' + tintF);
  if (tintS1) tintParts.push('측면1열: ' + tintS1);
  if (tintS2) tintParts.push('측면2열: ' + tintS2);
  if (tintR) tintParts.push('후면: ' + tintR);
  if (tintSun) tintParts.push('썬루프: ' + tintSun);
  if (tintParts.length) summaryParts.push('틴팅: ' + tintParts.join(', '));
  if (ppfText) summaryParts.push('PPF: ' + ppfText);
  if (combinedM) summaryParts.push(combinedM);
  const summary = summaryParts.join(' / ');
  
  const entryDate = $('#entryDate').value;
  const estPrice = $('#estPrice').value;
  const deposit = $('#deposit').value;
  const status = $('#status').value;
  const note = $('#note').value;
  
  showToast('전송 중... ⏳');
  try {
    const r = await apiPost({ action: 'submitFromWebApp', name, phone, carType, category, summary, estPrice, status, note, deposit, ppfText, combinedM, tintF, tintS1, tintS2, tintR, tintSun, entryDate, blackbox, battery });
    if (r.success) {
      showToast('✅ 전송 완료!');
      resetForm();
      State.customers = [];
      Cache.clear('customers');
    } else showToast('❌ 오류: ' + (r.error || ''));
  } catch(e) { showToast('❌ 오류: ' + e.message); }
}

function resetForm() {
  ['carType','name','phone','estPrice','deposit','note','etcValue','tintF','tintS1','tintS2','tintR','tintSun','blackbox','battery','status','entryDate'].forEach(id => {
    const el = $('#' + id);
    if (el) el.value = '';
  });
  $$('.check-item').forEach(el => { el.querySelector('input').checked = false; el.classList.remove('checked'); });
}

// 고객 목록 페이지

async function loadCustomers(forceRefresh = false) {
  const page = $('#page-customers');
  
  // 캐시 확인
  if (!forceRefresh) {
    const cached = Cache.get('customers');
    if (cached) {
      State.customers = cached.data;
      State.customerTotal = cached.total;
      renderCustomers();
      return;
    }
  }
  
  // 스켈레톤 로딩
  page.innerHTML = `<div class="search-box"><span style="color:#bbb">🔍</span><input type="text" id="search-input" placeholder="이름, 차종, 연락처 검색"></div>` +
    Array(5).fill('<div class="skeleton"></div>').join('');
  
  try {
    State.isLoading = true;
    const res = await api({ action: 'getCustomerList', offset: 0, limit: 30 });
    const data = res.data || res;
    State.customers = data;
    State.customerTotal = res.total || data.length;
    State.customerOffset = 0;
    Cache.set('customers', { data, total: State.customerTotal });
    renderCustomers();
  } catch(e) {
    page.innerHTML = `<div class="loading">❌ ${e.message}</div>`;
  } finally {
    State.isLoading = false;
  }
}

function renderCustomers() {
  const page = $('#page-customers');
  const data = State.customers;
  
  if (!data.length) {
    page.innerHTML = '<div class="loading">데이터가 없습니다.</div>';
    return;
  }
  
  // 정렬
  const todayD = new Date(); todayD.setHours(0,0,0,0);
  const sorted = [...data].sort((a, b) => {
    if (!!a.doneDate !== !!b.doneDate) return a.doneDate ? 1 : -1;
    const isNoShow = c => c.entryDate && !c.doneDate && (todayD - new Date(c.entryDate)) > 3*24*60*60*1000;
    if (isNoShow(a) !== isNoShow(b)) return isNoShow(a) ? 1 : -1;
    if (!!a.entryDate !== !!b.entryDate) return a.entryDate ? -1 : 1;
    if (a.entryDate && b.entryDate) return a.entryDate.localeCompare(b.entryDate);
    return (b.timestamp || '').localeCompare(a.timestamp || '');
  });
  
  State.customers = sorted;
  const todayStr = new Date().toISOString().slice(0,10);
  const todayCustomers = sorted.filter(c => c.entryDate === todayStr && !c.doneDate);
  
  // DocumentFragment로 DOM 구성
  const frag = document.createDocumentFragment();
  
  // 검색창
  const searchBox = document.createElement('div');
  searchBox.className = 'search-box';
  searchBox.innerHTML = '<span style="color:#bbb">🔍</span><input type="text" id="search-input" placeholder="이름, 차종, 연락처 검색">';
  frag.appendChild(searchBox);
  
  // 오늘 입고
  if (todayCustomers.length) {
    const box = document.createElement('div');
    box.className = 'today-box';
    box.innerHTML = `<div class="today-title">🚗 오늘 입고 (${todayCustomers.length}건)</div>` +
      todayCustomers.map(c => `<div class="today-item">
        <div><span style="font-weight:700;font-size:15px">${escapeHtml(c.name)}</span>
        <span style="color:#666;font-size:13px;margin-left:8px">${escapeHtml(c.carType)}</span>
        <span style="color:#999;font-size:12px;margin-left:8px">${escapeHtml(c.phone)}</span>
        ${c.estPrice?`<span style="color:#1a73e8;font-weight:600;font-size:13px;margin-left:8px">${c.estPrice}만원</span>`:''}</div>
      </div>`).join('');
    frag.appendChild(box);
  }
  
  // 고객 카드들
  const list = document.createElement('div');
  list.id = 'customer-list';
  list.innerHTML = sorted.map((c, i) => renderCustomerCard(c, i)).join('');
  frag.appendChild(list);
  
  // 더보기 버튼
  if (State.customers.length < State.customerTotal) {
    const more = document.createElement('div');
    more.style.cssText = 'text-align:center;margin:12px 0';
    more.innerHTML = `<button id="load-more-customers" style="padding:10px 24px;background:#f5f5f5;color:#555;border:1px solid #ddd;border-radius:8px;font-size:14px;cursor:pointer">⬇️ 더보기 (${State.customerTotal - State.customers.length}건)</button>`;
    frag.appendChild(more);
  }
  
  page.innerHTML = '';
  page.appendChild(frag);
}

async function loadMoreCustomers() {
  State.customerOffset += 30;
  try {
    const res = await api({ action: 'getCustomerList', offset: State.customerOffset, limit: 30 });
    const data = res.data || res;
    if (!data.length) { showToast('더 이상 데이터가 없어요'); return; }
    State.customers = [...State.customers, ...data];
    renderCustomers();
  } catch(e) { showToast('❌ ' + e.message); }
}

const searchCustomers = debounce(async (q) => {
  if (!q) { loadCustomers(); return; }
  $('#customer-list').innerHTML = '<div class="loading">검색 중...</div>';
  try {
    const results = await api({ action: 'searchCustomers', q });
    State.customers = results;
    State.customerTotal = results.length;
    renderCustomers();
  } catch(e) { showToast('❌ ' + e.message); }
}, 400);

function renderAftercare() {
  const page = $('#page-aftercare');
  const data = State.aftercare;
  
  if (!data.length) {
    page.innerHTML = '<div class="loading">데이터가 없습니다.</div>';
    return;
  }
  
  const today = new Date(); today.setHours(0,0,0,0);
  const sorted = [...data].sort((a, b) => {
    if (a.pin === '1' && b.pin !== '1') return 1;
    if (a.pin !== '1' && b.pin === '1') return -1;
    const todayStr = today.toISOString().split('T')[0];
    const getFollow = d => { if(!d.doneDate)return null; const f=new Date(d.doneDate);f.setDate(f.getDate()+14);return f.toISOString().split('T')[0]; };
    if (getFollow(a) === todayStr && getFollow(b) !== todayStr) return -1;
    if (getFollow(a) !== todayStr && getFollow(b) === todayStr) return 1;
    return (b.addedDate || '').localeCompare(a.addedDate || '');
  });
  
  page.innerHTML = `<div class="search-box"><span style="color:#bbb">🔍</span><input type="text" id="aftercare-search" placeholder="이름, 차종, 연락처 검색"></div><div id="aftercare-list">` +
    sorted.map((c, i) => renderAftercareCard(c, i)).join('') + '</div>' +
    (State.aftercare.length < State.aftercareTotal ? `<div style="text-align:center;padding:16px"><button id="load-more-aftercare" style="padding:10px 24px;background:#f5f5f5;border:1px solid #ddd;border-radius:8px;font-size:14px;color:#555;cursor:pointer">더보기 (${State.aftercareTotal - State.aftercare.length}건)</button></div>` : '');
}

function initTodoPage() {
  const page = $('#page-todo');
  page.innerHTML = `
    <div class="card">
      <div class="card-title">할일 추가</div>
      <div class="form-group"><label>날짜</label><input type="date" id="todo-date" value="${new Date().toISOString().slice(0,10)}"></div>
      <div class="form-group"><label>할일 내용</label><input type="text" id="todo-text" placeholder="할일을 입력하세요"></div>
      <button class="btn btn-primary" id="add-todo">+ 추가</button>
    </div>
    <div id="todo-list"></div>
  `;
  renderTodos();
}

function getTodos() { try { return JSON.parse(localStorage.getItem('motif_todos')||'[]'); } catch(e) { return []; } }
function saveTodos(todos) { localStorage.setItem('motif_todos', JSON.stringify(todos)); }

function renderTodos() {
  const todos = getTodos();
  const container = $('#todo-list');
  if (!container) return;
  if (!todos.length) { container.innerHTML = '<div class="loading">할일이 없어요 😊</div>'; return; }
  
  const groups = {};
  todos.sort((a,b) => a.date.localeCompare(b.date)).forEach(t => {
    if (!groups[t.date]) groups[t.date] = [];
    groups[t.date].push(t);
  });
  
  const today = new Date().toISOString().slice(0,10);
  container.innerHTML = Object.keys(groups).sort().map(date => {
    const isToday = date === today;
    const isPast = date < today;
    return `<div class="card" style="margin-bottom:12px">
      <div class="card-title" style="color:${isPast && !isToday ? '#e53935' : '#1a1a2e'}">${date.replace(/-/g,'.')}${isToday?' 📌 오늘':''}</div>

async function loadCalendar() {
  const y = State.calendarYear, m = State.calendarMonth + 1;
  const cacheKey = `cal_${y}_${m}`;
  
  // 캐시에서 먼저 렌더링
  const cached = Cache.get(cacheKey);
  if (cached) {
    State.calendarData = cached;
    renderCalendar();
  }
  
  // 예약 데이터 로드
  const resCached = Cache.get('reservations');
  if (resCached) {
    State.reservations = resCached;
  } else {
    try {
      State.reservations = await api({ action: 'getReservations' });
      Cache.set('reservations', State.reservations);
    } catch(e) {}
  }
  
  // 서버에서 최신 데이터 가져오기
  if (!cached) {
    try {
      const data = await api({ action: 'getCalendarData', year: y, month: m });
      State.calendarData = data;
      Cache.set(cacheKey, data);
      renderCalendar();
    } catch(e) {}
  }
}

function renderCalendar() {
  const y = State.calendarYear, m = State.calendarMonth;
  $('#calendar-title').textContent = `${y}년 ${m+1}월`;
  
  const entryMap = {};
  State.calendarData.forEach(c => { if(c.entryDate) { if(!entryMap[c.entryDate])entryMap[c.entryDate]=[]; entryMap[c.entryDate].push({...c,_type:'customer'}); }});
  State.reservations.forEach(r => { if(r.date) { const existing = entryMap[r.date]||[]; if(!existing.some(c=>c.name===r.name&&c.phone===r.phone)) { if(!entryMap[r.date])entryMap[r.date]=[]; entryMap[r.date].push({...r,_type:'reservation'}); }}});
  
  const today = new Date(); today.setHours(0,0,0,0);
  const firstDay = new Date(y, m, 1).getDay();
  const lastDate = new Date(y, m+1, 0).getDate();
  
  let cells = '';
  for (let i = 0; i < firstDay; i++) cells += '<div></div>';
  
  for (let d = 1; d <= lastDate; d++) {
    const dateStr = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isToday = new Date(y,m,d).getTime() === today.getTime();
    const events = entryMap[dateStr] || [];
    const dow = new Date(y,m,d).getDay();
    const color = dow===0?'#e53935':dow===6?'#1a73e8':'#333';
    
    cells += `<div class="cal-day" data-date="${dateStr}" style="min-height:52px;border-radius:8px;padding:4px;cursor:pointer;background:${isToday?'#e3f2fd':events.length?'#fff8e1':'transparent'};border:${isToday?'2px solid #1a73e8':'1px solid #eee'};overflow:hidden;min-width:0;box-sizing:border-box">
      <div style="font-size:12px;font-weight:${isToday?'700':'400'};color:${color};text-align:center">${d}</div>
      ${events.slice(0,2).map(e=>`<div style="font-size:10px;background:#ff9800;color:white;border-radius:3px;padding:1px 3px;margin-top:2px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis">${escapeHtml(e.carType)}</div>`).join('')}
      ${events.length>2?`<div style="font-size:10px;color:#999;text-align:center">+${events.length-2}</div>`:''}
    </div>`;
  }
  
  $('#calendar-grid').innerHTML = cells;
  $('#calendar-events').innerHTML = '';
}

// 전역 이벤트 위임
// ═══════════════════════════════════════════════════════════════
document.addEventListener('DOMContentLoaded', () => {
  // 네비게이션
  $$('.nav button[data-page]').forEach(btn => btn.addEventListener('click', () => showPage(btn.dataset.page)));
  $$('.more-btn[data-page]').forEach(btn => btn.addEventListener('click', () => showPage(btn.dataset.page)));
  $('#nav-more').addEventListener('click', () => { const m = $('#more-menu'); m.style.display = m.style.display === 'none' ? 'block' : 'none'; });
  $('#modal-close').addEventListener('click', () => $('#customer-modal').classList.remove('active'));
  
  // 체크박스 토글
  document.addEventListener('click', e => {
    if (e.target.closest('.check-item')) {
      const item = e.target.closest('.check-item');
      const cb = item.querySelector('input[type="checkbox"]');
      setTimeout(() => item.classList.toggle('checked', cb.checked), 0);
    }
  });
  
  // 전화번호 복사
  document.addEventListener('click', e => {
    if (e.target.classList.contains('copy-phone')) {
      const phone = e.target.dataset.phone;
      navigator.clipboard.writeText(phone).then(() => showToast('📋 ' + phone + ' 복사됨!'));
    }
  });
  
  // 상담 페이지
  document.addEventListener('click', e => {
    if (e.target.id === 'submit-consult') submitConsult();
    if (e.target.id === 'reset-form') resetForm();
  });
  
  // 고객 목록 이벤트
  document.addEventListener('change', async e => {
    // 상태 변경
    if (e.target.classList.contains('status-select')) {
      const ts = e.target.dataset.ts;
      try {
        const r = await apiPost({ action: 'updateCustomerField', timestamp: ts, field: 'status', value: e.target.value });
        showToast(r === 'ok' ? '✅ 업데이트!' : '❌ 실패');
      } catch(err) { showToast('❌ ' + err.message); }
    }
    // 재전송 변경
    if (e.target.classList.contains('resend-select')) {
      const ts = e.target.dataset.ts;
      try {
        const r = await apiPost({ action: 'updateCustomerField', timestamp: ts, field: 'resend', value: e.target.value });
        showToast(r === 'ok' ? '✅ 업데이트!' : '❌ 실패');
      } catch(err) { showToast('❌ ' + err.message); }
    }
    // 입고예정일 변경
    if (e.target.classList.contains('entry-date')) {
      const ts = e.target.dataset.ts;
      try {
        const r = await apiPost({ action: 'updateCustomerField', timestamp: ts, field: 'entryDate', value: e.target.value });
        if (r === 'ok') { showToast('✅ 날짜 변경됨'); State.customers = []; Cache.clear('customers'); loadCustomers(); }
        else showToast('❌ 실패');
      } catch(err) { showToast('❌ ' + err.message); }
    }
    // 시공완료일 변경
    if (e.target.classList.contains('done-date')) {
      const { ts, name, cartype, phone, category, summary, price } = e.target.dataset;
      const doneDate = e.target.value;
      if (!doneDate) return;
      if (!confirm(`${name} / ${cartype} 시공완료일을 ${doneDate}로 등록할까요?`)) return;
      showToast('⏳ 사후관리 등록 + 보증서 생성 중...');
      try {
        const r = await apiPost({ action: 'setDoneDate', timestamp: ts, name, carType: cartype, phone, category, summary, estPrice: price, doneDate });
        if (r.success) {
          showToast('✅ 등록 완료!');
          Cache.clear('customers'); Cache.clear('aftercare');
          if (confirm('시공완료 알림톡을 발송할까요?')) {
            await apiPost({ action: 'sendDoneAlimtalk', name, carType: cartype, phone, doneDate, pdfId: r.pdfId || '' });
            showToast('✅ 알림톡 발송 완료!');
          }
          loadCustomers(true);
        } else showToast('❌ 실패: ' + (r.error || ''));
      } catch(err) { showToast('❌ ' + err.message); }
    }
  });
  
  document.addEventListener('click', async e => {
    // 완료 버튼
    if (e.target.classList.contains('complete-btn')) {
      const ts = e.target.dataset.ts;
      if (!confirm('이 고객을 완료 처리할까요?')) return;
      try {
        const r = await apiPost({ action: 'completeCustomer', timestamp: ts });
        if (r === 'ok') { showToast('✅ 완료 처리됨'); State.customers = []; Cache.clear('customers'); loadCustomers(); }
        else showToast('❌ 실패');
      } catch(err) { showToast('❌ ' + err.message); }
    }
    // 삭제 버튼
    if (e.target.classList.contains('delete-btn')) {
      const ts = e.target.dataset.ts;
      if (!confirm('이 고객을 삭제할까요?')) return;
      try {
        const r = await apiPost({ action: 'deleteCustomer', timestamp: ts });
        if (r === 'ok') {
          showToast('✅ 삭제 완료!');
          State.customers = State.customers.filter(c => c.timestamp !== ts);
          Cache.clear('customers');
          renderCustomers();
        } else showToast('❌ 삭제 실패');
      } catch(err) { showToast('❌ ' + err.message); }
    }
    // 더보기
    if (e.target.id === 'load-more-customers') loadMoreCustomers();
  });
  
  // 검색
  document.addEventListener('input', e => {
    if (e.target.id === 'search-input') searchCustomers(e.target.value.trim());
    if (e.target.id === 'aftercare-search') {
      const q = e.target.value.toLowerCase();
      const filtered = q ? State.aftercare.filter(c => c.name.toLowerCase().includes(q) || c.carType.toLowerCase().includes(q) || c.phone.includes(q)) : State.aftercare;
      $('#aftercare-list').innerHTML = filtered.map((c, i) => renderAftercareCard(c, i)).join('');
    }
  });
  
  // 사후관리 이벤트
  document.addEventListener('change', async e => {
    if (e.target.classList.contains('pin-check')) {
      const { name, cartype, done } = e.target.dataset;
      try {
        await apiPost({ action: 'updatePin', name, carType: cartype, doneDate: done, value: e.target.checked ? '1' : '' });
        const idx = State.aftercare.findIndex(c => c.name === name && c.carType === cartype && c.doneDate === done);
        if (idx !== -1) { State.aftercare[idx].pin = e.target.checked ? '1' : ''; renderAftercare(); }
      } catch(err) { showToast('❌ ' + err.message); }
    }
    if (e.target.classList.contains('aftercare-status')) {
      const { name, cartype, done } = e.target.dataset;
      try {
        await apiPost({ action: 'updateAftercareStatus', name, carType: cartype, doneDate: done, value: e.target.value });
        showToast('✅ 상태 업데이트!');
      } catch(err) { showToast('❌ ' + err.message); }
    }
    if (e.target.classList.contains('warranty-select')) {
      const { name, cartype, done, pdfid } = e.target.dataset;
      const value = e.target.value;
      try {
        const r = await apiPost({ action: 'updateWarranty', name, carType: cartype, doneDate: done, warrantyValue: value });
        if (r === 'ok') {
          showToast('✅ 보증서 업데이트!');
          if (value.includes('발행')) {
            await apiPost({ action: 'sendWarrantyAlimtalk', name, carType: cartype, doneDate: done, warrantyValue: value, pdfId: pdfid });
            showToast('✅ 알림톡 발송 완료!');
          }
          State.aftercare = []; Cache.clear('aftercare'); loadAftercare();
        } else showToast('❌ 실패');
      } catch(err) { showToast('❌ ' + err.message); }
    }
  });
  
  document.addEventListener('click', async e => {
    if (e.target.classList.contains('warranty-pdf-btn')) {
      window.open('https://drive.google.com/file/d/' + e.target.dataset.id + '/view', '_blank');
    }
    if (e.target.classList.contains('done-alimtalk-btn')) {
      const { name, cartype, phone, done, pdfid } = e.target.dataset;
      if (!confirm(`${name} / ${cartype} 시공완료 알림톡을 발송할까요?`)) return;
      showToast('⏳ 발송 중...');
      try {
        const r = await apiPost({ action: 'sendDoneAlimtalk', name, carType: cartype, phone, doneDate: done, pdfId: pdfid });
        showToast(r === 'ok' ? '✅ 발송 완료!' : '❌ ' + (r.error || '실패'));
      } catch(err) { showToast('❌ ' + err.message); }
    }
    if (e.target.id === 'load-more-aftercare') {
      State.aftercareOffset += 15;
      try {
        const res = await api({ action: 'getAftercare', offset: State.aftercareOffset, limit: 15 });
        State.aftercare = [...State.aftercare, ...(res.data || [])];
        renderAftercare();
      } catch(err) { showToast('❌ ' + err.message); }
    }
  });
  
  // 할일 이벤트
  document.addEventListener('click', e => {
    if (e.target.id === 'add-todo') {
      const date = $('#todo-date').value;
      const text = $('#todo-text').value.trim();
      if (!date || !text) { showToast('날짜와 내용을 입력해주세요!'); return; }
      const todos = getTodos();
      todos.push({ id: Date.now(), date, text, done: false });
      saveTodos(todos);
      $('#todo-text').value = '';
      renderTodos();
      showToast('✅ 추가됐어요!');
    }
    if (e.target.classList.contains('todo-toggle')) {
      const id = parseInt(e.target.dataset.id);
      const todos = getTodos();
      const t = todos.find(t => t.id === id);
      if (t) t.done = !t.done;
      saveTodos(todos);
      renderTodos();
    }
    if (e.target.classList.contains('todo-delete')) {
      saveTodos(getTodos().filter(t => t.id !== parseInt(e.target.dataset.id)));
      renderTodos();
    }
  });
  
  // 캘린더 이벤트
  document.addEventListener('click', e => {
    if (e.target.id === 'cal-prev') { State.calendarMonth--; if (State.calendarMonth < 0) { State.calendarMonth = 11; State.calendarYear--; } loadCalendar(); }
    if (e.target.id === 'cal-next') { State.calendarMonth++; if (State.calendarMonth > 11) { State.calendarMonth = 0; State.calendarYear++; } loadCalendar(); }
    if (e.target.classList.contains('cal-day') || e.target.closest('.cal-day')) {
      const day = e.target.closest('.cal-day');
      if (day) showCalendarDay(day.dataset.date);
    }
  });
  
  // 메모 이벤트
  document.addEventListener('click', e => {
    if (e.target.id === 'add-memo') {
      const title = $('#memo-title').value.trim();
      const content = $('#memo-content').value.trim();
      const tag = $('#memo-tag').value;
      if (!content) { showToast('내용을 입력해주세요!'); return; }
      const memos = getMemos();
      memos.unshift({ id: Date.now(), title, content, tag, date: new Date().toLocaleDateString('ko-KR', { month:'short', day:'numeric', hour:'2-digit', minute:'2-digit' }), pinned: false });
      saveMemos(memos);
      $('#memo-title').value = '';
      $('#memo-content').value = '';
      renderMemos();
      showToast('✅ 메모 저장됐어요!');
    }
    if (e.target.classList.contains('memo-filter')) {
      State.memoFilter = e.target.dataset.tag;
      $$('.memo-filter').forEach(btn => { btn.style.background = '#f5f5f5'; btn.style.color = '#555'; btn.style.border = '1px solid #ddd'; });
      e.target.style.background = '#1a1a2e';
      e.target.style.color = 'white';
      e.target.style.border = '1px solid #1a1a2e';
      renderMemos();
    }
    if (e.target.classList.contains('memo-pin')) {
      const id = parseInt(e.target.dataset.id);
      const memos = getMemos();
      const m = memos.find(m => m.id === id);
      if (m) m.pinned = !m.pinned;
      saveMemos(memos);
      renderMemos();
    }
    if (e.target.classList.contains('memo-delete')) {
      if (confirm('삭제할까요?')) {
        saveMemos(getMemos().filter(m => m.id !== parseInt(e.target.dataset.id)));
        renderMemos();
      }
    }
  });
  
  // 유리막 보증서
  document.addEventListener('click', async e => {
    if (e.target.id === 'glass-submit') {
      const carType = $('#glass-cartype').value.trim();
      const carNumber = $('#glass-carnumber').value.trim();
      const phone = $('#glass-phone').value.trim();
      const date = $('#glass-date').value;
      const price = $('#glass-price').value.trim();
      if (!carType || !carNumber || !phone || !date || !price) { showToast('❌ 모든 항목을 입력해주세요'); return; }
      e.target.disabled = true; e.target.textContent = '⏳ 생성 중...';
      try {
        const r = await apiPost({ action: 'createGlassWarranty', carType, carNumber, phone, date, price });
        if (r && r.fileId) {
          $('#glass-result').innerHTML = `<div class="card" style="margin-top:16px;text-align:center"><div style="font-size:16px;font-weight:700;margin-bottom:12px">✅ 보증서 생성 완료!</div><button class="btn btn-primary" onclick="window.open('https://drive.google.com/file/d/${r.fileId}/view','_blank')">📄 보증서 열기</button></div>`;
          showToast('✅ 유리막 보증서 생성 완료!');
        } else showToast('❌ 생성 실패: ' + (r.error || ''));
      } catch(err) { showToast('❌ ' + err.message); }
      e.target.disabled = false; e.target.textContent = '📄 보증서 생성';
    }
  });
  
  // 견적서
  document.addEventListener('click', e => {
    if (e.target.id === 'add-inv-item') {
      const container = $('#inv-items');
      const div = document.createElement('div');
      div.className = 'inv-item';
      div.style.cssText = 'display:flex;gap:8px;margin-bottom:10px;align-items:center';
      div.innerHTML = `<input type="text" placeholder="품목명" style="flex:2;font-size:14px;border:1.5px solid #e8e8e8;border-radius:10px;padding:10px;font-family:inherit;outline:none"><input type="number" placeholder="금액" inputmode="numeric" class="inv-price" style="flex:1;font-size:14px;border:1.5px solid #e8e8e8;border-radius:10px;padding:10px;font-family:inherit;outline:none"><button class="inv-item-remove" style="padding:8px;background:#ffebee;color:#c62828;border:1px solid #ffcdd2;border-radius:8px;font-size:14px;cursor:pointer;flex-shrink:0">✕</button>`;
      container.appendChild(div);
    }
    if (e.target.classList.contains('inv-item-remove')) {
      if ($$('.inv-item').length <= 1) { showToast('품목은 최소 1개 필요해요'); return; }
      e.target.closest('.inv-item').remove();
      updateInvoiceTotal();
    }
  });
  
  document.addEventListener('input', e => {
    if (e.target.classList.contains('inv-price')) updateInvoiceTotal();
  });
  
  document.addEventListener('click', async e => {
    if (e.target.id === 'inv-submit') {
      const carNumber = $('#inv-carnumber').value.trim();
      const carType = $('#inv-cartype').value.trim();
      const date = $('#inv-date').value;
      const note = $('#inv-note').value.trim();
      if (!carType || !date) { showToast('차종과 날짜를 입력해주세요'); return; }
      const items = [...$$('.inv-item')].map(el => ({ name: el.querySelectorAll('input')[0].value.trim(), price: el.querySelectorAll('input')[1].value || '0' })).filter(it => it.name);
      if (!items.length) { showToast('품목을 최소 1개 입력해주세요'); return; }
      e.target.disabled = true; e.target.textContent = '⏳ 생성 중...';
      try {
        const r = await apiPost({ action: 'createInvoice', carNumber, carType, date, items, note });
        if (r && r.fileId) {
          $('#inv-result').innerHTML = `<div class="card" style="text-align:center"><div style="font-size:16px;font-weight:700;margin-bottom:12px">✅ 견적서 생성 완료!</div><button class="btn btn-primary" onclick="window.open('https://drive.google.com/file/d/${r.fileId}/view','_blank')">📄 견적서 열기</button></div>`;
          showToast('✅ 견적서 생성 완료!');
        } else showToast('❌ 실패: ' + (r.error || ''));
      } catch(err) { showToast('❌ ' + err.message); }
      e.target.disabled = false; e.target.textContent = '📑 견적서 생성';
    }
  });
  
  // 썬팅 보증서
  document.addEventListener('click', async e => {
    if (e.target.id === 'tw-submit') {
      const name = $('#tw-name').value.trim();
      const phone = $('#tw-phone').value.trim();
      const carNumber = $('#tw-carnumber').value.trim();
      const carType = $('#tw-cartype').value.trim();
      const date = $('#tw-date').value;
      const tintF = $('#tw-tintF').value, tintS1 = $('#tw-tintS1').value, tintS2 = $('#tw-tintS2').value;
      const tintR = $('#tw-tintR').value, tintSun = $('#tw-tintSun').value;
      const totalPrice = $('#tw-price').value;
      if (!name || !phone || !carType || !date) { showToast('고객명, 연락처, 차종, 시공날짜를 입력해주세요'); return; }
      e.target.disabled = true; e.target.textContent = '⏳ 생성 중...';
      try {
        const r = await apiPost({ action: 'createTintWarranty', name, phone, carNumber, carType, date, tintF, tintS1, tintS2, tintR, tintSun, totalPrice });
        if (r && r.fileId) {
          $('#tw-result').innerHTML = `<div class="card" style="text-align:center"><div style="font-size:16px;font-weight:700;margin-bottom:12px">✅ 보증서 생성 완료!</div><button class="btn btn-primary" style="margin-bottom:10px" onclick="window.open('https://drive.google.com/file/d/${r.fileId}/view','_blank')">📄 보증서 열기</button><button class="btn" style="background:#ff6b35;color:white" id="tw-send-done" data-name="${name}" data-cartype="${carType}" data-phone="${phone}" data-date="${date}" data-pdfid="${r.fileId}">📨 시공완료 알림톡 발송</button></div>`;
          showToast('✅ 썬팅 보증서 생성 완료!');
        } else showToast('❌ 실패: ' + (r.error || ''));
      } catch(err) { showToast('❌ ' + err.message); }
      e.target.disabled = false; e.target.textContent = '🎫 보증서 생성 + 시공완료 알림톡 발송';
    }
    if (e.target.id === 'tw-send-done') {
      const { name, cartype, phone, date, pdfid } = e.target.dataset;
      if (!confirm(`${name} / ${cartype}\n시공완료 알림톡을 발송할까요?`)) return;
      showToast('⏳ 발송 중...');
      try {
        const r = await apiPost({ action: 'sendDoneAlimtalk', name, carType: cartype, phone, doneDate: date, pdfId: pdfid });
        showToast(r === 'ok' ? '✅ 시공완료 알림톡 발송 완료!' : '❌ ' + (r.error || '실패'));
      } catch(err) { showToast('❌ ' + err.message); }
    }
  });
  
  // 초기화
  showPage('consult');
  
  // 워밍업 핑
  setTimeout(() => api({ action: 'ping' }).catch(() => {}), 1000);
});

function updateInvoiceTotal() {
  const prices = [...$$('.inv-price')].map(el => parseInt(el.value) || 0);
  const sub = prices.reduce((a, b) => a + b, 0);
  const tax = prices.reduce((a, b) => a + Math.round(b * 0.1), 0);
  const total = sub + tax;
  const el = $('#inv-total');
  if (el) el.textContent = total.toLocaleString('ko-KR') + '원 (세포함)';
}

function showCalendarDay(dateStr) {
  const entryMap = {};
  State.calendarData.forEach(c => { if(c.entryDate===dateStr) { if(!entryMap[dateStr])entryMap[dateStr]=[]; entryMap[dateStr].push({...c,_type:'customer'}); }});
  State.reservations.forEach(r => { if(r.date===dateStr) { const existing = entryMap[dateStr]||[]; if(!existing.some(c=>c.name===r.name&&c.phone===r.phone)) { if(!entryMap[dateStr])entryMap[dateStr]=[]; entryMap[dateStr].push({...r,_type:'reservation'}); }}});
  const events = entryMap[dateStr] || [];
  
  const el = $('#calendar-events');
  el.innerHTML = `<div class="card">
    <div style="font-size:14px;font-weight:700;margin-bottom:10px">🚗 ${dateStr} 입고 (${events.length}건)</div>
    ${events.length ? events.map(c => `<div style="background:${c._type==='reservation'?'#e8f5e9':'#f5f5f5'};border-radius:8px;padding:12px;margin-bottom:8px${c._type==='reservation'?';border:1px solid #c8e6c9':''}">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div>
          ${c._type==='reservation'?'<span style="font-size:10px;background:#2e7d32;color:white;border-radius:4px;padding:1px 5px;margin-right:6px">예약</span>':''}
          <span style="font-weight:700;font-size:15px">${escapeHtml(c.carType)}</span>
          <span style="color:#666;font-size:13px;margin-left:6px">${escapeHtml(c.name)}</span>
        </div>
        ${c.estPrice?`<span style="color:#1a73e8;font-weight:700">${c.estPrice}만원</span>`:''}
      </div>
      ${c.work?`<div style="font-size:12px;color:#555;margin-top:4px">📋 ${escapeHtml(c.work)}</div>`:''}
      <div style="font-size:12px;color:#999;margin-top:4px">${escapeHtml(c.phone)}</div>
      <div style="display:flex;gap:6px;margin-top:8px">
        <button onclick="location.href='tel:${c.phone}'" style="flex:1;padding:6px;background:#e8f5e9;color:#2e7d32;border:1px solid #c8e6c9;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer">📞</button>
        <button onclick="location.href='sms:${c.phone}'" style="flex:1;padding:6px;background:#fff8e1;color:#f57f17;border:1px solid #ffe082;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer">💬</button>
      </div>
    </div>`).join('') : '<div style="color:#999;font-size:13px">입고 예정 없음</div>'}
  </div>`;
}
</script>
</body>
</html>
