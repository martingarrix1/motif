// ═══════════════════════════════════════════════════════════════
// MOTIF 프론트엔드 최적화 — <script> 태그 내용을 교체
// 기존 기능 100% 유지, 속도만 개선
// ═══════════════════════════════════════════════════════════════

const API_URL = 'https://script.google.com/macros/s/AKfycbzv3xVInSeTmisnUk7X9u2eRNeRbOgrCs--Wuaqh0BtCx4n4BV00Ik4RsoqoMKi071zDw/exec';

let allCustomers = [];
let allAftercare = [];
let allReservations = [];
let calendarCustomers = [];

// ─── [최적화1] 캐시 유틸 강화 ────────────────────────────
const CACHE_TTL = 10 * 60 * 1000;
const _cache = {};  // 메모리 캐시 (sessionStorage보다 빠름)

function cacheSet(key, data) {
  _cache[key] = { t: Date.now(), d: data };
  try { sessionStorage.setItem(key, JSON.stringify(_cache[key])); } catch(e) {}
}

function cacheGet(key) {
  // 메모리 캐시 먼저 확인 (sessionStorage 파싱 비용 절감)
  if (_cache[key] && Date.now() - _cache[key].t < CACHE_TTL) return _cache[key].d;
  try {
    const v = sessionStorage.getItem(key);
    if (!v) return null;
    const p = JSON.parse(v);
    if (Date.now() - p.t > CACHE_TTL) { sessionStorage.removeItem(key); return null; }
    _cache[key] = p;
    return p.d;
  } catch(e) { return null; }
}

function cacheClear(key) {
  delete _cache[key];
  try { sessionStorage.removeItem(key); } catch(e) {}
}

function cacheClearAll() {
  Object.keys(_cache).forEach(k => delete _cache[k]);
  try { sessionStorage.clear(); } catch(e) {}
}

// ─── [최적화2] API 호출 래퍼 (타임아웃 + AbortController) ──
let _apiController = null;

async function api(params) {
  const url = API_URL + '?' + new URLSearchParams(params);
  const controller = new AbortController();
  const timeout = setTimeout(() => controller.abort(), 25000); // 25초 타임아웃
  try {
    const res = await fetch(url, { signal: controller.signal });
    clearTimeout(timeout);
    return res.json();
  } catch(e) {
    clearTimeout(timeout);
    if (e.name === 'AbortError') throw new Error('서버 응답 시간 초과');
    throw e;
  }
}

async function apiPost(body) {
  const controller = new AbortController();
  const timeout = setTimeout(() => controller.abort(), 30000);
  try {
    const res = await fetch(API_URL, {
      method: 'POST',
      body: JSON.stringify(body),
      signal: controller.signal
    });
    clearTimeout(timeout);
    return res.json();
  } catch(e) {
    clearTimeout(timeout);
    if (e.name === 'AbortError') throw new Error('서버 응답 시간 초과');
    throw e;
  }
}

// ─── [최적화3] 앱 시작 시 병렬 로딩 ──────────────────────
// DOMContentLoaded에서 실행
let _batchLoaded = false;

async function initApp() {
  // 1. 캐시에 데이터 있으면 즉시 표시
  const cached = cacheGet('batch');
  if (cached) {
    _applyBatchData(cached);
    _batchLoaded = true;
  }
  
  // 2. 백그라운드에서 서버 데이터 새로 가져오기
  try {
    const fresh = await api({ action: 'batchLoad', custLimit: 30, afterLimit: 30 });
    if (fresh && !fresh.error) {
      cacheSet('batch', fresh);
      _applyBatchData(fresh);
      _batchLoaded = true;
    }
  } catch(e) {
    // batchLoad 미지원 시 기존 방식 폴백
    if (!_batchLoaded) {
      _fallbackLoad();
    }
  }
}

function _applyBatchData(data) {
  if (data.customers) {
    allCustomers = data.customers.data || [];
    window._customerTotal = data.customers.total || allCustomers.length;
    hasMoreCustomers = allCustomers.length < window._customerTotal;
    cacheSet('customers_0', data.customers);
  }
  if (data.aftercare) {
    allAftercare = data.aftercare.data || [];
    aftercareTotal = data.aftercare.total || allAftercare.length;
    cacheSet('aftercare_0', data.aftercare);
  }
  if (data.reservations) {
    allReservations = data.reservations;
    cacheSet('reservations', data.reservations);
  }
  
  // 현재 보이는 페이지만 렌더링
  const activePage = document.querySelector('.page.active');
  if (activePage) {
    const id = activePage.id;
    if (id === 'page-customers' && allCustomers.length) renderCustomers(allCustomers);
    if (id === 'page-aftercare' && allAftercare.length) renderAftercare(allAftercare);
    if (id === 'page-calendar') renderCalendar();
  }
}

async function _fallbackLoad() {
  // batchLoad 없을 때 병렬로 개별 호출
  const [custRes, afterRes, resRes] = await Promise.allSettled([
    api({ action: 'getCustomerList', offset: 0, limit: 30 }),
    api({ action: 'getAftercare', offset: 0, limit: 30 }),
    api({ action: 'getReservations' })
  ]);
  
  if (custRes.status === 'fulfilled' && custRes.value) {
    const d = custRes.value;
    allCustomers = d.data || d;
    window._customerTotal = d.total || allCustomers.length;
    hasMoreCustomers = allCustomers.length < window._customerTotal;
  }
  if (afterRes.status === 'fulfilled' && afterRes.value) {
    const d = afterRes.value;
    allAftercare = d.data || d;
    aftercareTotal = d.total || allAftercare.length;
  }
  if (resRes.status === 'fulfilled' && resRes.value) {
    allReservations = resRes.value;
  }
  
  _batchLoaded = true;
  const activePage = document.querySelector('.page.active');
  if (activePage?.id === 'page-customers') renderCustomers(allCustomers);
}

// ─── [최적화4] 이벤트 위임 ───────────────────────────────
// 카드마다 onclick 붙이는 대신 컨테이너에 한 번만 붙임

function setupEventDelegation() {
  // 고객목록 이벤트 위임
  document.getElementById('customer-list').addEventListener('click', handleCustomerClick);
  document.getElementById('customer-list').addEventListener('change', handleCustomerChange);
  
  // 사후관리 이벤트 위임
  document.getElementById('aftercare-list').addEventListener('click', handleAftercareClick);
  document.getElementById('aftercare-list').addEventListener('change', handleAftercareChange);
}

function handleCustomerClick(e) {
  const btn = e.target.closest('[data-action]');
  if (!btn) {
    // 카드 클릭 → 상세보기
    const card = e.target.closest('[data-idx]');
    if (card && !e.target.closest('select, input, button, [data-action]')) {
      showCustomerDetail(parseInt(card.dataset.idx));
    }
    return;
  }
  
  const action = btn.dataset.action;
  const card = btn.closest('[data-ts]');
  const ts = card?.dataset.ts;
  const data = JSON.parse(card?.dataset.info || '{}');
  
  switch(action) {
    case 'call': window.location.href = 'tel:' + data.phone; break;
    case 'sms': window.location.href = 'sms:' + data.phone; break;
    case 'copy': copyPhone(data.phone); break;
    case 'complete': completeCustomer(ts); break;
    case 'delete': deleteCustomer(ts); break;
  }
}

function handleCustomerChange(e) {
  const el = e.target;
  const card = el.closest('[data-ts]');
  if (!card) return;
  const ts = card.dataset.ts;
  const data = JSON.parse(card.dataset.info || '{}');
  
  if (el.dataset.field === 'status') {
    updateCustomerField(ts, 'status', el.value);
  } else if (el.dataset.field === 'resend') {
    updateCustomerField(ts, 'resend', el.value);
  } else if (el.dataset.field === 'entryDate') {
    changeEntryDate(ts, el.value);
  } else if (el.dataset.field === 'doneDate') {
    setDoneDate(ts, data.name, data.carType, data.phone, data.category, data.summary, data.estPrice, el.value);
  }
}

// ─── [최적화5] 경량 렌더링 ───────────────────────────────
// DocumentFragment + 최소 DOM 노드

let customerOffset = 0;
let hasMoreCustomers = true;
let aftercareOffset = 0;
let aftercareTotal = 0;
const AFTERCARE_LIMIT = 15;

function renderCustomers(data) {
  const container = document.getElementById('customer-list');
  if (!data.length) { container.innerHTML = '<div class="loading">데이터가 없습니다.</div>'; return; }

  const todayD = new Date(); todayD.setHours(0,0,0,0);
  const todayStr = todayD.toISOString().slice(0,10);
  
  // 정렬
  const sorted = [...data].sort((a, b) => {
    const aDone = !!a.doneDate, bDone = !!b.doneDate;
    if (aDone && !bDone) return 1;
    if (!aDone && bDone) return -1;
    const isNoShow = (c) => {
      if (!c.entryDate || c.doneDate) return false;
      const d = new Date(c.entryDate); d.setHours(0,0,0,0);
      return (todayD - d) > 3 * 86400000;
    };
    const aNS = isNoShow(a), bNS = isNoShow(b);
    if (aNS && !bNS) return 1;
    if (!aNS && bNS) return -1;
    if (a.entryDate && !b.entryDate) return -1;
    if (!a.entryDate && b.entryDate) return 1;
    if (a.entryDate && b.entryDate) return a.entryDate.localeCompare(b.entryDate);
    return (b.timestamp || '').localeCompare(a.timestamp || '');
  });

  allCustomers = sorted;
  const todayCustomers = sorted.filter(c => c.entryDate === todayStr);

  // 문자열 조합 (innerHTML보다 빠른 건 없음, 다만 문자열을 배열로)
  const parts = [];

  // 오늘 입고 배너
  if (todayCustomers.length) {
    parts.push(`<div style="background:#fff3e0;border:2px solid #ff9800;border-radius:12px;padding:14px;margin-bottom:16px">
      <div style="font-size:15px;font-weight:700;color:#e65100;margin-bottom:10px">🚗 오늘 입고 (${todayCustomers.length}건)</div>
      ${todayCustomers.map(c => `<div style="background:#fff;border-radius:8px;padding:10px 12px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center">
        <div><b style="font-size:15px">${c.name}</b><span style="color:#666;font-size:13px;margin-left:8px">${c.carType}</span>
        <span style="color:#999;font-size:12px;margin-left:8px">${c.phone}</span>
        ${c.estPrice ? `<span style="color:#1a73e8;font-weight:600;font-size:13px;margin-left:8px">${c.estPrice}만원</span>` : ''}</div>
      </div>`).join('')}
    </div>`);
  }

  // 카드 렌더링 — data-ts, data-idx, data-info로 이벤트 위임 지원
  sorted.forEach((c, i) => {
    const info = JSON.stringify({name:c.name,carType:c.carType,phone:c.phone,category:c.category||'',summary:c.summary||'',estPrice:c.estPrice||''}).replace(/"/g, '&quot;');
    const revisit = allCustomers.filter(x=>x.phone===c.phone&&x.timestamp!==c.timestamp).length > 0;
    const catClass = (c.category||'').includes('PPF')?'badge-ppf':(c.category||'').includes('썬팅')?'badge-tinting':'badge-coating';
    const entryShort = c.entryDate ? ((d)=>d.getMonth()+1+'.'+(d.getDate()))(new Date(c.entryDate)) : '';

    parts.push(`<div class="customer-card" data-ts="${c.timestamp}" data-idx="${i}" data-info="${info}">
      <div style="cursor:pointer">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <div style="display:flex;align-items:center;gap:6px">
            <div class="customer-name">${c.name}</div>
            ${revisit?'<span style="font-size:11px;background:#fff3e0;color:#e65100;border-radius:4px;padding:2px 5px;font-weight:700">재방문</span>':''}
          </div>
          <span class="badge ${catClass}">${c.category||'-'}</span>
        </div>
        <div class="customer-car">${c.carType} · <span data-action="copy" style="cursor:pointer;text-decoration:underline dotted">${c.phone}</span></div>
        ${c.summary ? `<div style="font-size:13px;color:#999;margin-top:4px;line-height:1.5">${c.summary}</div>` : ''}
        <div class="customer-meta">
          ${entryShort ? `<span style="font-size:12px;color:#e65100;font-weight:600">🚗 ${entryShort}</span>` : ''}
          ${c.doneDate ? `<span style="font-size:12px;color:#2e7d32;font-weight:600">✅ ${c.doneDate}</span>` : ''}
          ${c.estPrice ? `<span class="price-text">${c.estPrice}만원</span>` : ''}
        </div>
      </div>
      <div style="display:flex;gap:8px;margin-top:12px">
        <select data-field="status" style="flex:1;font-size:14px;border:1px solid #ddd;border-radius:8px;padding:8px;font-weight:600">
          <option value="">-</option>
          <option value="상담" ${c.status==='상담'?'selected':''}>상담</option>
          <option value="예약" ${c.status==='예약'?'selected':''}>예약</option>
          <option value="예약안내" ${c.status==='예약안내'?'selected':''}>예약안내</option>
          <option value="상담진행" ${c.status==='상담진행'?'selected':''}>상담진행</option>
        </select>
        <select data-field="resend" style="flex:1;font-size:14px;border:1px solid #ddd;border-radius:8px;padding:8px;font-weight:600">
          <option value="">재전송-</option>
          <option value="재전송 1차" ${c.resend==='재전송 1차'?'selected':''}>1차</option>
          <option value="재전송 2차" ${c.resend==='재전송 2차'?'selected':''}>2차</option>
          <option value="재전송 3차" ${c.resend==='재전송 3차'?'selected':''}>3차</option>
          <option value="재전송 4차" ${c.resend==='재전송 4차'?'selected':''}>4차</option>
        </select>
      </div>
      <div style="display:flex;gap:6px;margin-top:10px">
        <button class="btn btn-small btn-pdf" style="flex:1" data-action="call">📞</button>
        <button class="btn btn-small" style="flex:1;background:#fff8e1;color:#f57f17;border:1px solid #ffe082" data-action="sms">💬</button>
        <button data-action="complete" style="padding:8px 12px;background:#e8f5e9;color:#2e7d32;border:1px solid #c8e6c9;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer">✅</button>
        <button data-action="delete" style="padding:8px 12px;background:#fff0f0;color:#d32f2f;border:1px solid #ffcdd2;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer">🗑</button>
      </div>
      <div style="margin-top:8px;display:flex;align-items:center;gap:8px">
        <span style="font-size:12px;color:#e65100;white-space:nowrap">입고</span>
        <input type="date" value="${c.entryDate||''}" data-field="entryDate" style="flex:1;font-size:13px;border:1px solid #ffcc80;border-radius:8px;padding:6px 8px">
      </div>
      <div style="margin-top:6px;display:flex;align-items:center;gap:8px">
        <span style="font-size:12px;color:#666;white-space:nowrap">완료</span>
        <input type="date" value="${c.doneDate||''}" data-field="doneDate" style="flex:1;font-size:13px;border:1px solid #ddd;border-radius:8px;padding:6px 8px">
        ${c.doneDate ? '<span style="font-size:11px;color:#2e7d32;font-weight:600">✅</span>' : ''}
      </div>
    </div>`);
  });

  // 더보기 버튼
  if (hasMoreCustomers) {
    parts.push(`<div style="text-align:center;margin:12px 0">
      <button onclick="loadMoreCustomers()" style="padding:10px 24px;background:#f5f5f5;color:#555;border:1px solid #ddd;border-radius:8px;font-size:14px;cursor:pointer">⬇️ 더보기 (${(window._customerTotal||0) - allCustomers.length}건)</button>
    </div>`);
  }

  // requestAnimationFrame으로 DOM 업데이트 (스크롤 버벅임 방지)
  requestAnimationFrame(() => {
    container.innerHTML = parts.join('');
  });
}


// ─── [최적화6] 옵티미스틱 UI ─────────────────────────────
// 서버 응답 기다리지 않고 UI 먼저 반영

async function updateCustomerField(timestamp, field, value) {
  // 즉시 UI 반영
  const idx = allCustomers.findIndex(c => c.timestamp === timestamp);
  if (idx !== -1) allCustomers[idx][field] = value;
  
  try {
    const r = await apiPost({ action: 'updateCustomerField', timestamp, field, value });
    showToast(r === 'ok' ? '✅ 업데이트!' : '❌ 실패');
    if (r !== 'ok' && idx !== -1) {
      // 실패 시 롤백 → 다시 로드
      allCustomers = []; loadCustomers();
    }
  } catch(e) { showToast('❌ ' + e.message); }
}

async function completeCustomer(timestamp) {
  if (!confirm('완료 처리할까요?')) return;
  
  // 옵티미스틱: 즉시 doneDate 세팅하고 재렌더
  const idx = allCustomers.findIndex(c => c.timestamp === timestamp);
  if (idx !== -1) {
    allCustomers[idx].doneDate = new Date().toISOString().slice(0,10);
    renderCustomers(allCustomers);
  }
  
  try {
    const r = await apiPost({ action: 'completeCustomer', timestamp });
    if (r === 'ok') showToast('✅ 완료!');
    else { allCustomers = []; loadCustomers(); showToast('❌ 실패'); }
  } catch(e) { showToast('❌ ' + e.message); }
}

async function deleteCustomer(timestamp) {
  if (!confirm('삭제할까요?')) return;
  
  // 옵티미스틱: 즉시 목록에서 제거
  const backup = [...allCustomers];
  allCustomers = allCustomers.filter(c => c.timestamp !== timestamp);
  renderCustomers(allCustomers);
  
  try {
    const r = await apiPost({ action: 'deleteCustomer', timestamp });
    if (r === 'ok') { showToast('✅ 삭제 완료!'); cacheClear('customers_0'); cacheClear('batch'); }
    else { allCustomers = backup; renderCustomers(allCustomers); showToast('❌ 실패'); }
  } catch(e) { allCustomers = backup; renderCustomers(allCustomers); showToast('❌ ' + e.message); }
}


// ─── [최적화7] 페이지 전환 시 필요한 것만 로드 ──────────
function showPage(page, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
  document.getElementById('more-menu').style.display = 'none';
  document.getElementById('page-' + page).classList.add('active');
  if (btn) btn.classList.add('active');
  
  // 이미 batchLoad로 데이터가 있으면 렌더만, 없으면 로드
  switch(page) {
    case 'customers':
      if (allCustomers.length) renderCustomers(allCustomers);
      else loadCustomers();
      break;
    case 'aftercare':
      if (allAftercare.length) renderAftercare(allAftercare);
      else loadAftercare();
      break;
    case 'calendar':
      loadCalendar();
      break;
    case 'todo':
      initTodo();
      break;
    case 'memo':
      initMemo();
      break;
    case 'invoice':
      initInvoice();
      break;
    case 'tint':
      initTint();
      break;
  }
}


// ─── [최적화8] 검색 — 클라이언트 우선, 서버 보조 ─────────
let searchTimer = null;

function filterCustomers() {
  const q = document.getElementById('search-input').value.trim().toLowerCase();
  if (!q) { renderCustomers(allCustomers); return; }
  
  // 먼저 로컬 데이터에서 필터링 (즉시 반응)
  const local = allCustomers.filter(c =>
    c.name.toLowerCase().includes(q) ||
    c.phone.includes(q) ||
    c.carType.toLowerCase().includes(q)
  );
  if (local.length) renderCustomers(local);
  
  // 400ms 후 서버 검색 (더 많은 결과 가능)
  clearTimeout(searchTimer);
  searchTimer = setTimeout(async () => {
    try {
      const results = await api({ action: 'searchCustomers', q });
      if (results.length > local.length) {
        allCustomers = results;
        renderCustomers(results);
      }
    } catch(e) {}
  }, 600);
}


// ─── [최적화9] loadCustomers 개선 ────────────────────────
async function loadCustomers() {
  customerOffset = 0;
  hasMoreCustomers = true;
  
  // 캐시 확인
  const cached = cacheGet('customers_0');
  if (cached) {
    allCustomers = cached.data || cached;
    window._customerTotal = cached.total || allCustomers.length;
    hasMoreCustomers = allCustomers.length < window._customerTotal;
    renderCustomers(allCustomers);
    return; // 캐시 있으면 서버 재호출 안 함
  }
  
  document.getElementById('customer-list').innerHTML = '<div class="loading">불러오는 중...</div>';
  try {
    const res = await api({ action: 'getCustomerList', offset: 0, limit: 30 });
    const data = res.data || res;
    allCustomers = data;
    window._customerTotal = res.total || data.length;
    hasMoreCustomers = allCustomers.length < window._customerTotal;
    cacheSet('customers_0', res);
    renderCustomers(data);
  } catch(e) {
    document.getElementById('customer-list').innerHTML = '<div class="loading">❌ ' + e.message + '</div>';
  }
}

async function loadMoreCustomers() {
  customerOffset += 30;
  try {
    const res = await api({ action: 'getCustomerList', offset: customerOffset, limit: 30 });
    const data = res.data || res;
    if (!data.length) { showToast('더 이상 없어요'); hasMoreCustomers = false; return; }
    allCustomers = [...allCustomers, ...data];
    if (allCustomers.length >= (res.total || Infinity)) hasMoreCustomers = false;
    renderCustomers(allCustomers);
  } catch(e) { showToast('❌ ' + e.message); }
}


// ─── [최적화10] 사후관리 로드 개선 ──────────────────────
async function loadAftercare() {
  aftercareOffset = 0;
  
  const cached = cacheGet('aftercare_0');
  if (cached) {
    allAftercare = cached.data || cached;
    aftercareTotal = cached.total || allAftercare.length;
    renderAftercare(allAftercare);
    renderAftercareLoadMoreBtn();
    return;
  }
  
  document.getElementById('aftercare-list').innerHTML = '<div class="loading">불러오는 중...</div>';
  try {
    const res = await api({ action: 'getAftercare', offset: 0, limit: AFTERCARE_LIMIT });
    const data = res.data || res;
    allAftercare = data;
    aftercareTotal = res.total || data.length;
    cacheSet('aftercare_0', res);
    renderAftercare(allAftercare);
    renderAftercareLoadMoreBtn();
  } catch(e) {
    document.getElementById('aftercare-list').innerHTML = '<div class="loading">❌ ' + e.message + '</div>';
  }
}

function renderAftercareLoadMoreBtn() {
  const existing = document.getElementById('aftercare-more-btn');
  if (existing) existing.remove();
  if (allAftercare.length < aftercareTotal) {
    const btn = document.createElement('div');
    btn.id = 'aftercare-more-btn';
    btn.style.cssText = 'text-align:center;padding:16px';
    btn.innerHTML = `<button onclick="loadMoreAftercare()" style="padding:10px 24px;background:#f5f5f5;border:1px solid #ddd;border-radius:8px;font-size:14px;color:#555;cursor:pointer">더보기 (${aftercareTotal - allAftercare.length}건)</button>`;
    document.getElementById('aftercare-list').after(btn);
  }
}

async function loadMoreAftercare() {
  aftercareOffset += AFTERCARE_LIMIT;
  try {
    const res = await api({ action: 'getAftercare', offset: aftercareOffset, limit: AFTERCARE_LIMIT });
    allAftercare = [...allAftercare, ...(res.data || [])];
    renderAftercare(allAftercare);
    renderAftercareLoadMoreBtn();
  } catch(e) { showToast('❌ ' + e.message); }
}


// ─── [최적화11] DOMContentLoaded ─────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  setupEventDelegation();
  initApp();  // 병렬 로딩 시작
  
  // 체크박스 이벤트
  document.querySelectorAll('.check-item').forEach(label => {
    label.addEventListener('click', function() {
      const cb = this.querySelector('input[type="checkbox"]');
      setTimeout(() => this.classList.toggle('checked', cb.checked), 0);
    });
  });
});
