<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>MOTIF 상담관리 v3</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; }
    
    /* 탭 네비게이션 */
    .tabs { display: flex; background: #1a1a2e; overflow-x: auto; position: sticky; top: 0; z-index: 100; }
    .tab { padding: 14px 16px; color: #888; cursor: pointer; white-space: nowrap; font-size: 14px; border-bottom: 2px solid transparent; transition: all 0.2s; }
    .tab.active { color: #fff; border-bottom-color: #4a90d9; background: rgba(74,144,217,0.1); }
    
    /* 컨텐츠 영역 */
    .content { display: none; padding: 16px; max-width: 100%; }
    .content.active { display: block; }
    
    /* 로딩 상태 */
    .loading-bar { position: fixed; top: 0; left: 0; height: 3px; background: linear-gradient(90deg, #4a90d9, #67b26f); width: 0; transition: width 0.3s; z-index: 1000; }
    .loading-bar.active { width: 30%; animation: loading 1.5s ease-in-out infinite; }
    @keyframes loading { 0% { width: 30%; } 50% { width: 70%; } 100% { width: 30%; } }
    .loading-bar.done { width: 100%; }
    
    /* 동기화 상태 표시 */
    .sync-status { position: fixed; top: 50px; right: 10px; padding: 6px 12px; border-radius: 20px; font-size: 11px; z-index: 99; transition: all 0.3s; }
    .sync-status.syncing { background: #fff3cd; color: #856404; }
    .sync-status.synced { background: #d4edda; color: #155724; opacity: 0; }
    .sync-status.offline { background: #f8d7da; color: #721c24; }
    
    /* 카드 스타일 */
    .card { background: #fff; border-radius: 12px; padding: 16px; margin-bottom: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .card-title { font-weight: 600; font-size: 16px; }
    .card-subtitle { color: #666; font-size: 13px; }
    .card-badge { padding: 4px 10px; border-radius: 12px; font-size: 11px; font-weight: 500; }
    .badge-done { background: #d4edda; color: #155724; }
    .badge-pending { background: #fff3cd; color: #856404; }
    .badge-new { background: #cce5ff; color: #004085; }
    
    /* 버튼 */
    .btn { padding: 10px 16px; border: none; border-radius: 8px; font-size: 14px; cursor: pointer; transition: all 0.2s; }
    .btn-primary { background: #4a90d9; color: #fff; }
    .btn-primary:hover { background: #3a7bc8; }
    .btn-primary:disabled { background: #ccc; cursor: not-allowed; }
    .btn-secondary { background: #e9ecef; color: #495057; }
    .btn-sm { padding: 6px 12px; font-size: 12px; }
    
    /* 입력 필드 */
    .input-group { margin-bottom: 12px; }
    .input-group label { display: block; margin-bottom: 4px; font-size: 13px; color: #666; }
    .input-group input, .input-group select, .input-group textarea { width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; }
    .input-group input:focus, .input-group select:focus, .input-group textarea:focus { outline: none; border-color: #4a90d9; }
    
    /* 검색바 */
    .search-bar { position: sticky; top: 48px; background: #f5f5f5; padding: 12px 0; z-index: 50; }
    .search-bar input { width: 100%; padding: 12px 16px; border: none; border-radius: 25px; background: #fff; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    
    /* 더보기 버튼 */
    .load-more { width: 100%; padding: 14px; background: #e9ecef; border: none; border-radius: 8px; color: #495057; cursor: pointer; margin-top: 12px; }
    
    /* 빈 상태 */
    .empty-state { text-align: center; padding: 40px 20px; color: #888; }
    
    /* 체크박스 그룹 */
    .checkbox-group { display: flex; flex-wrap: wrap; gap: 8px; }
    .checkbox-item { display: flex; align-items: center; gap: 6px; padding: 8px 12px; background: #f8f9fa; border-radius: 8px; cursor: pointer; }
    .checkbox-item.checked { background: #4a90d9; color: #fff; }
    
    /* 모달 */
    .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); display: none; justify-content: center; align-items: center; z-index: 200; padding: 20px; }
    .modal-overlay.active { display: flex; }
    .modal { background: #fff; border-radius: 16px; width: 100%; max-width: 500px; max-height: 90vh; overflow-y: auto; }
    .modal-header { padding: 16px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
    .modal-body { padding: 16px; }
    .modal-footer { padding: 16px; border-top: 1px solid #eee; display: flex; gap: 8px; justify-content: flex-end; }
    
    /* 캘린더 */
    .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
    .calendar-header { text-align: center; padding: 8px; font-weight: 600; color: #666; font-size: 12px; }
    .calendar-day { aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; padding: 4px; border-radius: 8px; font-size: 12px; cursor: pointer; }
    .calendar-day:hover { background: #f0f0f0; }
    .calendar-day.today { background: #e3f2fd; }
    .calendar-day.has-event { background: #fff3cd; }
    .calendar-day.has-event.today { background: linear-gradient(135deg, #e3f2fd 50%, #fff3cd 50%); }
    .calendar-dot { width: 6px; height: 6px; background: #4a90d9; border-radius: 50%; margin-top: 2px; }
    
    /* 스켈레톤 로딩 */
    .skeleton { background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%); background-size: 200% 100%; animation: skeleton 1.5s infinite; border-radius: 8px; }
    @keyframes skeleton { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    .skeleton-card { height: 100px; margin-bottom: 12px; }
    
    /* 액션 버튼 그룹 */
    .action-row { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
    .action-row .btn { flex: 1; min-width: 80px; }
    
    /* 상태 드롭다운 */
    .status-select { padding: 6px 10px; border-radius: 12px; border: none; font-size: 12px; cursor: pointer; }
    
    /* 핀 아이콘 */
    .pin-icon { cursor: pointer; font-size: 18px; }
    .pin-icon.pinned { color: #ffc107; }
    
    /* 푸터 네비게이션 (모바일) */
    @media (max-width: 600px) {
      .tabs { position: fixed; bottom: 0; top: auto; width: 100%; justify-content: space-around; }
      .content { padding-bottom: 70px; }
      .search-bar { top: 0; }
    }
  </style>
</head>
<body>
  <div class="loading-bar" id="loadingBar"></div>
  <div class="sync-status" id="syncStatus"></div>
  
  <div class="tabs">
    <div class="tab active" data-tab="consult">상담</div>
    <div class="tab" data-tab="customers">고객</div>
    <div class="tab" data-tab="calendar">캘린더</div>
    <div class="tab" data-tab="aftercare">사후관리</div>
    <div class="tab" data-tab="glass">유리막</div>
    <div class="tab" data-tab="invoice">견적서</div>
    <div class="tab" data-tab="tint">썬팅보증</div>
    <div class="tab" data-tab="memo">메모</div>
  </div>

  <!-- 상담 탭 -->
  <div class="content active" id="consult">
    <div class="card">
      <div class="input-group">
        <label>고객명 *</label>
        <input type="text" id="cName" placeholder="이름">
      </div>
      <div class="input-group">
        <label>연락처 *</label>
        <input type="tel" id="cPhone" placeholder="010-0000-0000">
      </div>
      <div class="input-group">
        <label>차종 *</label>
        <input type="text" id="cCarType" placeholder="차종">
      </div>
      <div class="input-group">
        <label>시공항목</label>
        <div class="checkbox-group" id="cCategory">
          <div class="checkbox-item" data-value="썬팅">썬팅</div>
          <div class="checkbox-item" data-value="PPF">PPF</div>
          <div class="checkbox-item" data-value="유리막">유리막</div>
          <div class="checkbox-item" data-value="가죽">가죽</div>
          <div class="checkbox-item" data-value="전장">전장</div>
          <div class="checkbox-item" data-value="복합">복합</div>
        </div>
      </div>
      <div class="input-group">
        <label>상담내용</label>
        <textarea id="cSummary" rows="3" placeholder="상담 내용"></textarea>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
        <div class="input-group">
          <label>예상견적 (만원)</label>
          <input type="text" id="cEstPrice" placeholder="0">
        </div>
        <div class="input-group">
          <label>계약금 (만원)</label>
          <input type="text" id="cDeposit" placeholder="0">
        </div>
      </div>
      <div class="input-group">
        <label>입고예정일</label>
        <input type="date" id="cEntryDate">
      </div>
      <div class="input-group">
        <label>상태</label>
        <select id="cStatus">
          <option value="상담">상담</option>
          <option value="예약">예약</option>
          <option value="예약안내">예약안내</option>
          <option value="">미발송</option>
        </select>
      </div>
      
      <!-- 썬팅 상세 -->
      <details style="margin-top:12px;">
        <summary style="cursor:pointer;color:#666;">썬팅 상세</summary>
        <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:8px;">
          <input type="text" id="cTintF" placeholder="전면">
          <input type="text" id="cTintS1" placeholder="측면1열">
          <input type="text" id="cTintS2" placeholder="측면2열">
          <input type="text" id="cTintR" placeholder="후면">
          <input type="text" id="cTintSun" placeholder="썬루프">
        </div>
      </details>
      
      <!-- PPF 상세 -->
      <details style="margin-top:12px;">
        <summary style="cursor:pointer;color:#666;">PPF 상세</summary>
        <div class="checkbox-group" id="cPPF" style="margin-top:8px;">
          <div class="checkbox-item" data-value="본넷">본넷</div>
          <div class="checkbox-item" data-value="문콕">문콕</div>
          <div class="checkbox-item" data-value="프런트A">프런트A</div>
          <div class="checkbox-item" data-value="프런트F">프런트F</div>
          <div class="checkbox-item" data-value="생활보호">생활보호</div>
          <div class="checkbox-item" data-value="전체">전체</div>
        </div>
      </details>
      
      <!-- 기타 -->
      <details style="margin-top:12px;">
        <summary style="cursor:pointer;color:#666;">기타 항목</summary>
        <div style="margin-top:8px;">
          <div class="checkbox-group" id="cCoating">
            <div class="checkbox-item" data-value="유리막">유리막</div>
            <div class="checkbox-item" data-value="그래핀">그래핀</div>
            <div class="checkbox-item" data-value="가죽기본">가죽기본</div>
            <div class="checkbox-item" data-value="UG가죽">UG가죽</div>
            <div class="checkbox-item" data-value="야와라A">야와라A</div>
            <div class="checkbox-item" data-value="야와라B">야와라B</div>
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px;">
            <input type="text" id="cBlackbox" placeholder="블랙박스">
            <input type="text" id="cBattery" placeholder="보조배터리">
          </div>
        </div>
      </details>
      
      <div class="input-group" style="margin-top:12px;">
        <label>비고</label>
        <textarea id="cNote" rows="2" placeholder="메모"></textarea>
      </div>
      
      <button class="btn btn-primary" style="width:100%;margin-top:16px;" id="submitBtn">전송</button>
    </div>
  </div>

  <!-- 고객 탭 -->
  <div class="content" id="customers">
    <div class="search-bar">
      <input type="text" id="customerSearch" placeholder="🔍 이름, 연락처, 차종 검색...">
    </div>
    <div id="customerList"></div>
    <button class="load-more" id="loadMoreCustomers" style="display:none;">더 보기</button>
  </div>

  <!-- 캘린더 탭 -->
  <div class="content" id="calendar">
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
        <button class="btn btn-secondary btn-sm" id="prevMonth">&lt;</button>
        <span id="calendarTitle" style="font-weight:600;"></span>
        <button class="btn btn-secondary btn-sm" id="nextMonth">&gt;</button>
      </div>
      <div class="calendar-grid">
        <div class="calendar-header">일</div>
        <div class="calendar-header">월</div>
        <div class="calendar-header">화</div>
        <div class="calendar-header">수</div>
        <div class="calendar-header">목</div>
        <div class="calendar-header">금</div>
        <div class="calendar-header">토</div>
      </div>
      <div class="calendar-grid" id="calendarDays"></div>
    </div>
    <div id="calendarEvents"></div>
    
    <!-- 예약 추가 -->
    <div class="card" style="margin-top:16px;">
      <div class="card-title" style="margin-bottom:12px;">예약 추가</div>
      <div class="input-group">
        <input type="text" id="resName" placeholder="이름">
      </div>
      <div class="input-group">
        <input type="tel" id="resPhone" placeholder="연락처">
      </div>
      <div class="input-group">
        <input type="text" id="resCarType" placeholder="차종">
      </div>
      <div class="input-group">
        <input type="text" id="resWork" placeholder="작업내용">
      </div>
      <div class="input-group">
        <input type="date" id="resDate">
      </div>
      <div style="display:flex;gap:8px;align-items:center;margin-bottom:12px;">
        <input type="checkbox" id="resSendAlimtalk">
        <label for="resSendAlimtalk" style="font-size:13px;">예약확인 알림톡 발송</label>
      </div>
      <button class="btn btn-primary" style="width:100%;" id="addReservation">예약 등록</button>
    </div>
  </div>

  <!-- 사후관리 탭 -->
  <div class="content" id="aftercare">
    <div class="search-bar">
      <input type="text" id="aftercareSearch" placeholder="🔍 검색...">
    </div>
    <div id="aftercareList"></div>
    <button class="load-more" id="loadMoreAftercare" style="display:none;">더 보기</button>
  </div>

  <!-- 유리막 탭 -->
  <div class="content" id="glass">
    <div class="card">
      <div class="card-title" style="margin-bottom:12px;">유리막 보증서 발급</div>
      <div class="input-group">
        <label>차종</label>
        <input type="text" id="glassCarType" placeholder="차종">
      </div>
      <div class="input-group">
        <label>차량번호</label>
        <input type="text" id="glassCarNumber" placeholder="12가 3456">
      </div>
      <div class="input-group">
        <label>연락처</label>
        <input type="tel" id="glassPhone" placeholder="010-0000-0000">
      </div>
      <div class="input-group">
        <label>시공일자</label>
        <input type="date" id="glassDate">
      </div>
      <div class="input-group">
        <label>시공금액</label>
        <input type="text" id="glassPrice" placeholder="만원">
      </div>
      <button class="btn btn-primary" style="width:100%;margin-top:12px;" id="createGlassWarranty">보증서 발급</button>
    </div>
  </div>

  <!-- 견적서 탭 -->
  <div class="content" id="invoice">
    <div class="card">
      <div class="card-title" style="margin-bottom:12px;">견적서 작성</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
        <div class="input-group">
          <label>차량번호</label>
          <input type="text" id="invCarNumber" placeholder="12가 3456">
        </div>
        <div class="input-group">
          <label>차종</label>
          <input type="text" id="invCarType" placeholder="차종">
        </div>
      </div>
      <div class="input-group">
        <label>날짜</label>
        <input type="date" id="invDate">
      </div>
      <div id="invoiceItems">
        <div class="invoice-item" style="display:grid;grid-template-columns:2fr 1fr 30px;gap:8px;margin-bottom:8px;">
          <input type="text" placeholder="품목명" class="inv-name">
          <input type="text" placeholder="금액" class="inv-price">
          <button class="btn btn-secondary btn-sm" onclick="this.parentElement.remove()">×</button>
        </div>
      </div>
      <button class="btn btn-secondary btn-sm" style="margin-bottom:12px;" onclick="addInvoiceItem()">+ 품목 추가</button>
      <div class="input-group">
        <label>특이사항</label>
        <textarea id="invNote" rows="2" placeholder="비고"></textarea>
      </div>
      <button class="btn btn-primary" style="width:100%;" id="createInvoice">견적서 생성</button>
    </div>
  </div>

  <!-- 썬팅보증서 탭 -->
  <div class="content" id="tint">
    <div class="card">
      <div class="card-title" style="margin-bottom:12px;">썬팅 보증서 발급</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
        <div class="input-group">
          <label>성함</label>
          <input type="text" id="tintName" placeholder="이름">
        </div>
        <div class="input-group">
          <label>연락처</label>
          <input type="tel" id="tintPhone" placeholder="010-0000-0000">
        </div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
        <div class="input-group">
          <label>차량번호</label>
          <input type="text" id="tintCarNumber" placeholder="12가 3456">
        </div>
        <div class="input-group">
          <label>차종</label>
          <input type="text" id="tintCarType" placeholder="차종">
        </div>
      </div>
      <div class="input-group">
        <label>시공일자</label>
        <input type="date" id="tintDate">
      </div>
      <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:8px;">
        <div class="input-group">
          <label>전면</label>
          <input type="text" id="tintF" placeholder="전면">
        </div>
        <div class="input-group">
          <label>측면1열</label>
          <input type="text" id="tintS1" placeholder="측면1열">
        </div>
        <div class="input-group">
          <label>측면2열</label>
          <input type="text" id="tintS2" placeholder="측면2열">
        </div>
        <div class="input-group">
          <label>후면</label>
          <input type="text" id="tintR" placeholder="후면">
        </div>
        <div class="input-group">
          <label>썬루프</label>
          <input type="text" id="tintSunroof" placeholder="썬루프">
        </div>
        <div class="input-group">
          <label>총금액</label>
          <input type="text" id="tintTotalPrice" placeholder="만원">
        </div>
      </div>
      <button class="btn btn-primary" style="width:100%;margin-top:12px;" id="createTintWarranty">보증서 발급</button>
    </div>
  </div>

  <!-- 메모 탭 -->
  <div class="content" id="memo">
    <div class="card">
      <textarea id="memoText" rows="20" placeholder="메모를 입력하세요..." style="width:100%;border:none;resize:none;font-size:14px;line-height:1.6;"></textarea>
      <div style="display:flex;gap:8px;margin-top:12px;">
        <button class="btn btn-primary" id="saveMemo" style="flex:1;">저장</button>
        <button class="btn btn-secondary" id="clearMemo">초기화</button>
      </div>
    </div>
  </div>

  <!-- 고객 상세 모달 -->
  <div class="modal-overlay" id="customerModal">
    <div class="modal">
      <div class="modal-header">
        <span class="card-title">고객 상세</span>
        <button class="btn btn-secondary btn-sm" onclick="closeModal('customerModal')">×</button>
      </div>
      <div class="modal-body" id="customerModalBody"></div>
    </div>
  </div>

  <!-- 사후관리 상세 모달 -->
  <div class="modal-overlay" id="aftercareModal">
    <div class="modal">
      <div class="modal-header">
        <span class="card-title">사후관리 상세</span>
        <button class="btn btn-secondary btn-sm" onclick="closeModal('aftercareModal')">×</button>
      </div>
      <div class="modal-body" id="aftercareModalBody"></div>
    </div>
  </div>

<script>
// ═══════════════════════════════════════════════════════════════════
// 설정
// ═══════════════════════════════════════════════════════════════════
const API_URL = 'https://script.google.com/macros/s/AKfycbzv3xVInSeTmisnUk7X9u2eRNeRbOgrCs--Wuaqh0BtCx4n4BV00Ik4RsoqoMKi071zDw/exec';
const DB_NAME = 'motif_db';
const DB_VERSION = 1;
const STORES = { customers: 'customers', aftercare: 'aftercare', calendar: 'calendar', memo: 'memo' };
const BATCH_SIZE = 15;

let db = null;
let customerData = [];
let aftercareData = [];
let calendarData = [];
let customerOffset = 0;
let aftercareOffset = 0;
let currentYear, currentMonth;

// ═══════════════════════════════════════════════════════════════════
// IndexedDB 초기화
// ═══════════════════════════════════════════════════════════════════
async function initDB() {
  return new Promise((resolve, reject) => {
    const request = indexedDB.open(DB_NAME, DB_VERSION);
    
    request.onerror = () => reject(request.error);
    request.onsuccess = () => { db = request.result; resolve(db); };
    
    request.onupgradeneeded = (e) => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains(STORES.customers)) {
        db.createObjectStore(STORES.customers, { keyPath: 'id' });
      }
      if (!db.objectStoreNames.contains(STORES.aftercare)) {
        db.createObjectStore(STORES.aftercare, { keyPath: 'id' });
      }
      if (!db.objectStoreNames.contains(STORES.calendar)) {
        db.createObjectStore(STORES.calendar, { keyPath: 'id' });
      }
      if (!db.objectStoreNames.contains(STORES.memo)) {
        db.createObjectStore(STORES.memo, { keyPath: 'id' });
      }
    };
  });
}

async function dbGet(store, key) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(store, 'readonly');
    const req = tx.objectStore(store).get(key);
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

async function dbPut(store, data) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(store, 'readwrite');
    const req = tx.objectStore(store).put(data);
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

// ═══════════════════════════════════════════════════════════════════
// Stale-While-Revalidate 패턴
// ═══════════════════════════════════════════════════════════════════
async function fetchWithSWR(action, params = {}, storeKey, renderFn) {
  showLoading();
  
  // 1. 로컬 먼저 (즉시 표시)
  try {
    const cached = await dbGet(storeKey, 'data');
    if (cached && cached.items && cached.items.length > 0) {
      renderFn(cached.items);
      showSyncStatus('syncing');
    }
  } catch (e) {}
  
  // 2. 서버에서 최신 데이터 가져오기 (백그라운드)
  try {
    const url = new URL(API_URL);
    url.searchParams.set('action', action);
    Object.keys(params).forEach(k => url.searchParams.set(k, params[k]));
    
    const res = await fetch(url);
    const data = await res.json();
    
    if (data && !data.error) {
      const items = data.data || data;
      await dbPut(storeKey, { id: 'data', items, timestamp: Date.now() });
      renderFn(items);
      showSyncStatus('synced');
    }
  } catch (e) {
    console.error('Fetch error:', e);
    showSyncStatus('offline');
  }
  
  hideLoading();
}

// ═══════════════════════════════════════════════════════════════════
// UI 헬퍼
// ═══════════════════════════════════════════════════════════════════
function showLoading() {
  document.getElementById('loadingBar').classList.add('active');
}

function hideLoading() {
  const bar = document.getElementById('loadingBar');
  bar.classList.remove('active');
  bar.classList.add('done');
  setTimeout(() => bar.classList.remove('done'), 300);
}

function showSyncStatus(status) {
  const el = document.getElementById('syncStatus');
  el.className = 'sync-status ' + status;
  el.textContent = status === 'syncing' ? '동기화 중...' : status === 'synced' ? '최신' : '오프라인';
  if (status === 'synced') {
    setTimeout(() => el.style.opacity = '0', 1500);
  } else {
    el.style.opacity = '1';
  }
}

function showToast(msg) {
  const toast = document.createElement('div');
  toast.style.cssText = 'position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:12px 24px;border-radius:25px;z-index:1000;font-size:14px;';
  toast.textContent = msg;
  document.body.appendChild(toast);
  setTimeout(() => toast.remove(), 2500);
}

function closeModal(id) {
  document.getElementById(id).classList.remove('active');
}

async function loadCustomers(reset = false) {
  if (reset) {
    customerOffset = 0;
    customerData = [];
  }
  
  await fetchWithSWR('getCustomerList', { offset: 0, limit: 200 }, STORES.customers, (items) => {
    customerData = items;
    renderCustomers();
  });
}

function renderCustomers(filtered = null) {
  const data = filtered || customerData;
  const container = document.getElementById('customerList');
  const displayData = data.slice(0, customerOffset + BATCH_SIZE);
  
  if (displayData.length === 0) {
    container.innerHTML = '<div class="empty-state">고객이 없습니다</div>';
    document.getElementById('loadMoreCustomers').style.display = 'none';
    return;

  const fragment = document.createDocumentFragment();
  displayData.forEach(c => {
    const card = document.createElement('div');
    card.className = 'card';
    card.style.cursor = 'pointer';
    
    const badge = c.doneDate ? 'badge-done' : (c.entryDate ? 'badge-pending' : 'badge-new');

    if (a.pin !== 'Y' && b.pin === 'Y') return 1;
    return 0;

    card.style.cursor = 'pointer';
    
    const hasWarranty = a.warranty && a.warranty.trim();

async function loadCalendar() {
  const now = new Date();
  currentYear = currentYear || now.getFullYear();
  currentMonth = currentMonth || now.getMonth() + 1;
  
  await fetchWithSWR('getCalendarData', { year: currentYear, month: currentMonth }, STORES.calendar, (items) => {
    calendarData = items;
    renderCalendar();
  });
}

function renderCalendar() {
  document.getElementById('calendarTitle').textContent = `${currentYear}년 ${currentMonth}월`;
  
  const container = document.getElementById('calendarDays');
  const firstDay = new Date(currentYear, currentMonth - 1, 1).getDay();
  const lastDate = new Date(currentYear, currentMonth, 0).getDate();
  const today = new Date();
  const todayStr = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
  
  // 이벤트 날짜 맵
  const eventDates = {};
  calendarData.forEach(e => {
    if (e.entryDate) {
      if (!eventDates[e.entryDate]) eventDates[e.entryDate] = [];
      eventDates[e.entryDate].push(e);
    }
  });
  
  let html = '';
  
  // 빈 칸
  for (let i = 0; i < firstDay; i++) {
    html += '<div class="calendar-day"></div>';
  }
  
  // 날짜
  for (let d = 1; d <= lastDate; d++) {
    const dateStr = `${currentYear}-${String(currentMonth).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isToday = dateStr === todayStr;
    const hasEvent = eventDates[dateStr];
    
    let classes = 'calendar-day';
    if (isToday) classes += ' today';
    if (hasEvent) classes += ' has-event';
    
    html += `
      <div class="${classes}" onclick="showDayEvents('${dateStr}')">
        <span>${d}</span>
        ${hasEvent ? '<div class="calendar-dot"></div>' : ''}
      </div>
    `;
  }
  
  container.innerHTML = html;
}

function showDayEvents(dateStr) {
  const events = calendarData.filter(e => e.entryDate === dateStr);
  const container = document.getElementById('calendarEvents');
  
  if (events.length === 0) {
    container.innerHTML = `<div class="card"><div class="empty-state">${dateStr}<br>예약이 없습니다</div></div>`;
    return;
  }
  
  container.innerHTML = events.map(e => `
    <div class="card">
      <div class="card-header">
        <div>
          <div class="card-title">${e.name || '이름없음'}</div>
          <div class="card-subtitle">${e.carType || ''}</div>
        </div>
      </div>
      <div style="font-size:13px;color:#666;">
        ${e.category ? `<div>${e.category}</div>` : ''}
        ${e.summary ? `<div>${e.summary}</div>` : ''}
      </div>
    </div>
  `).join('');
}

// ═══════════════════════════════════════════════════════════════════
// API 호출
// ═══════════════════════════════════════════════════════════════════
async function apiPost(action, data) {
  showLoading();
  try {
    const res = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action, ...data })
    });
    const result = await res.json();
    hideLoading();
    return result;
  } catch (e) {
    hideLoading();
    console.error('API Error:', e);
    return { error: e.message };
  }
}

async function submitConsultation() {
  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.textContent = '⏳ 전송중...';
  
  const getChecked = (id) => [...document.querySelectorAll(`#${id} .checkbox-item.checked`)].map(el => el.dataset.value).join(' / ');
  
  const data = {
    name: document.getElementById('cName').value.trim(),
    phone: document.getElementById('cPhone').value.trim(),
    carType: document.getElementById('cCarType').value.trim(),
    category: getChecked('cCategory'),
    summary: document.getElementById('cSummary').value.trim(),
    estPrice: document.getElementById('cEstPrice').value.trim(),
    deposit: document.getElementById('cDeposit').value.trim(),
    entryDate: document.getElementById('cEntryDate').value,
    status: document.getElementById('cStatus').value,
    tintF: document.getElementById('cTintF').value.trim(),
    tintS1: document.getElementById('cTintS1').value.trim(),
    tintS2: document.getElementById('cTintS2').value.trim(),
    tintR: document.getElementById('cTintR').value.trim(),
    tintSun: document.getElementById('cTintSun').value.trim(),
    ppfText: getChecked('cPPF'),
    combinedM: getChecked('cCoating'),
    blackbox: document.getElementById('cBlackbox').value.trim(),
    battery: document.getElementById('cBattery').value.trim(),
    note: document.getElementById('cNote').value.trim()
  };
  
  if (!data.name || !data.phone || !data.carType) {
    showToast('이름, 연락처, 차종은 필수입니다');
    btn.disabled = false;
    btn.textContent = '전송';
    return;
  }
  
  const result = await apiPost('submitFromWebApp', data);
  
  if (result.success) {
    showToast('전송 완료!');
    // 폼 초기화
    document.querySelectorAll('#consult input, #consult textarea').forEach(el => el.value = '');
    document.querySelectorAll('#consult .checkbox-item').forEach(el => el.classList.remove('checked'));
    document.getElementById('cStatus').value = '상담';
    // 데이터 새로고침
    loadCustomers(true);
  } else {
    showToast('오류: ' + (result.error || '전송 실패'));
  }
  
  btn.disabled = false;
  btn.textContent = '전송';
}

async function setDoneDate(timestamp, name, carType, phone, category, summary, estPrice) {
  const doneDate = prompt('시공완료일 (YYYY-MM-DD)', new Date().toISOString().split('T')[0]);
  if (!doneDate) return;
  
  closeModal('customerModal');
  
  const result = await apiPost('setDoneDate', { timestamp, name, carType, phone, category, summary, estPrice, doneDate });
  
  if (result.success || result.pdfId) {
    showToast('시공완료 처리됨');
    loadCustomers(true);
    loadAftercare(true);
  } else {
    showToast('오류: ' + (result.error || '처리 실패'));
  }
}

async function resendAlimtalk(timestamp) {
  const result = await apiPost('updateCustomerField', { timestamp, field: 'resend', value: 'Y' });
  if (result === 'ok') {
    showToast('알림톡 재발송 완료');
  } else {
    showToast('오류: ' + (result.error || result));
  }
}

async function togglePin(name, carType, doneDate, currentPin) {
  const newPin = currentPin === 'Y' ? '' : 'Y';
  const result = await apiPost('updatePin', { name, carType, doneDate, value: newPin });
  if (result === 'ok') {
    loadAftercare(true);
  }
}

async function generateWarranty(name, carType, doneDate) {
  closeModal('aftercareModal');
  const result = await apiPost('generateWarranty', { name, carType, doneDate });
  if (result.success || result.pdfId) {
    showToast('보증서 생성 완료');
    loadAftercare(true);
  } else {

async function loadMemo() {
  try {
    const cached = await dbGet(STORES.memo, 'data');
    if (cached) {
      document.getElementById('memoText').value = cached.text || '';
    }
  } catch (e) {}
}

async function saveMemo() {
  const text = document.getElementById('memoText').value;
  await dbPut(STORES.memo, { id: 'data', text, timestamp: Date.now() });
  showToast('메모 저장됨');
}

function clearMemo() {
  if (confirm('메모를 초기화하시겠습니까?')) {
    document.getElementById('memoText').value = '';
    saveMemo();
  }
}

// ═══════════════════════════════════════════════════════════════════
// 검색
// ═══════════════════════════════════════════════════════════════════
let searchTimeout;

function setupSearch() {
  document.getElementById('customerSearch').addEventListener('input', (e) => {
    clearTimeout(searchTimeout);
    searchTimeout = setTimeout(() => {
      const q = e.target.value.toLowerCase().trim();
      if (!q) {
        renderCustomers();
        return;
      }
      const filtered = customerData.filter(c => 
        (c.name || '').toLowerCase().includes(q) ||
        (c.phone || '').includes(q) ||
        (c.carType || '').toLowerCase().includes(q)
      );
      renderCustomers(filtered);
    }, 200);
  });
  
  document.getElementById('aftercareSearch').addEventListener('input', (e) => {
    clearTimeout(searchTimeout);
    searchTimeout = setTimeout(() => {
      const q = e.target.value.toLowerCase().trim();
      if (!q) {
        renderAftercare();
        return;
      }
      const filtered = aftercareData.filter(a => 
        (a.name || '').toLowerCase().includes(q) ||
        (a.phone || '').includes(q) ||
        (a.carType || '').toLowerCase().includes(q)
      );
      renderAftercare(filtered);
    }, 200);
  });
}

// ═══════════════════════════════════════════════════════════════════
// 이벤트 리스너
// ═══════════════════════════════════════════════════════════════════
function setupEventListeners() {
  // 탭 전환
  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
      tab.classList.add('active');
      document.getElementById(tab.dataset.tab).classList.add('active');
      
      // 탭별 데이터 로드
      if (tab.dataset.tab === 'customers') loadCustomers();
      if (tab.dataset.tab === 'aftercare') loadAftercare();
      if (tab.dataset.tab === 'calendar') loadCalendar();
      if (tab.dataset.tab === 'memo') loadMemo();
    });
  });
  
  // 체크박스 토글
  document.querySelectorAll('.checkbox-group').forEach(group => {
    group.addEventListener('click', (e) => {
      if (e.target.classList.contains('checkbox-item')) {
        e.target.classList.toggle('checked');
      }
    });
  });
  
  // 더보기
  document.getElementById('loadMoreCustomers').addEventListener('click', () => {
    customerOffset += BATCH_SIZE;
    renderCustomers();
  });
  
  document.getElementById('loadMoreAftercare').addEventListener('click', () => {
    aftercareOffset += BATCH_SIZE;
    renderAftercare();
  });
  
  // 캘린더 네비게이션
  document.getElementById('prevMonth').addEventListener('click', () => {
    currentMonth--;
    if (currentMonth < 1) { currentMonth = 12; currentYear--; }
    loadCalendar();
  });
  
  document.getElementById('nextMonth').addEventListener('click', () => {
    currentMonth++;
    if (currentMonth > 12) { currentMonth = 1; currentYear++; }
    loadCalendar();
  });
  
  // 버튼들
  document.getElementById('submitBtn').addEventListener('click', submitConsultation);
  document.getElementById('addReservation').addEventListener('click', addReservation);
  document.getElementById('createGlassWarranty').addEventListener('click', createGlassWarranty);
  document.getElementById('createInvoice').addEventListener('click', createInvoice);
  document.getElementById('createTintWarranty').addEventListener('click', createTintWarranty);
  document.getElementById('saveMemo').addEventListener('click', saveMemo);
  document.getElementById('clearMemo').addEventListener('click', clearMemo);
  
  // 모달 닫기
  document.querySelectorAll('.modal-overlay').forEach(modal => {
    modal.addEventListener('click', (e) => {
      if (e.target === modal) modal.classList.remove('active');
    });
  });
  
  // 검색
  setupSearch();
}

// ═══════════════════════════════════════════════════════════════════
// 초기화
// ═══════════════════════════════════════════════════════════════════
async function init() {
  await initDB();
  setupEventListeners();
  
  // 오늘 날짜 기본값
  const today = new Date().toISOString().split('T')[0];

  fetch(API_URL + '?action=ping').catch(() => {});
  
  // 메모 로드
  loadMemo();
}

init();
